name: Update JPX company master

on:
  workflow_dispatch:

permissions:
  contents: write

# Published static branch remains ref: main.
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop source
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install --upgrade pandas xlrd

      - name: Update JPX company master
        run: python scripts/update_jpx_companies.py

      - name: Commit updated company master
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: develop
          commit_message: "data: update JPX company master"
          file_pattern: src/data/listedCompanies.json
