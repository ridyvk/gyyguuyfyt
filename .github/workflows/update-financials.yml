name: Update annual financials

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-financials.yml
      - scripts/update_edinet_financials.py
      - scripts/run_edinet_financials_strict.py
      - scripts/update_tdnet_financials.py
      - scripts/update_tdnet_financials_strict.py
      - scripts/update_tdnet_financials_overlay_strict.py
      - scripts/update_market_prices.py
      - scripts/finalize_annual_dataset.py
      - public/data/financials.json
      - public/data/market.json
      - public/data/update-status.json
  schedule:
    - cron: '17 */3 * * *'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: Days to scan
        required: false
        default: '31'
      bootstrap_days:
        description: EDINET bootstrap days
        required: false
        default: '460'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: annual-financial-update
  cancel-in-progress: true

jobs:
  update:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update EDINET annual baseline
        continue-on-error: true
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          LOOKBACK_DAYS: ${{ inputs.lookback_days || '31' }}
          BOOTSTRAP_DAYS: ${{ inputs.bootstrap_days || '460' }}
        run: |
          if [ -z "$EDINET_API_KEY" ]; then
            echo "EDINET key is not configured. Skipping annual baseline update."
          else
            python scripts/run_edinet_financials_strict.py \
              --lookback-days "$LOOKBACK_DAYS" \
              --bootstrap-days "$BOOTSTRAP_DAYS"
          fi

      - name: Overlay strict TDnet full-year financials
        env:
          LOOKBACK_DAYS: ${{ inputs.lookback_days || '31' }}
        run: |
          python scripts/update_tdnet_financials_overlay_strict.py \
            --lookback-days "$LOOKBACK_DAYS"

      - name: Update market snapshot
        continue-on-error: true
        run: python scripts/update_market_prices.py

      - name: Finalize annual dataset
        run: python scripts/finalize_annual_dataset.py

      - name: Commit updated snapshot
        run: |
          git config user.name "kpi-scope-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data/financials.json public/data/market.json public/data/update-status.json
          if git diff --cached --quiet; then
            echo "No snapshot changes."
          else
            git commit -m "Update annual financial snapshot"
            git push
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build application
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
