name: Update annual financials

on:
  workflow_run:
    workflows:
      - Update JPX company master
    types: [completed]
  push:
    branches:
      - main
    paths:
      - .github/workflows/update-financials.yml
      - .github/triggers/financials-batch.txt
      - scripts/update_edinet_financials.py
      - scripts/update_edinet_financials_batched.py
      - scripts/data_quality.py
      - scripts/validate_datasets.py
      - scripts/update_tdnet_financials.py
      - scripts/update_tdnet_financials_strict.py
      - scripts/update_tdnet_financials_overlay_strict.py
      - scripts/finalize_annual_dataset.py
      - src/data/listedCompanies.json
      - public/data/financials.json
      - public/data/update-status.json
  schedule:
    - cron: '17 */3 * * *'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: Days to scan TDnet listings
        required: false
        default: '31'
      edinet_scan_days:
        description: Days to scan EDINET filings
        required: false
        default: '460'
      edinet_batch_size:
        description: Maximum EDINET annual filings to process in one run
        required: false
        default: '50'

permissions:
  contents: write

concurrency:
  group: annual-financial-update
  cancel-in-progress: true

jobs:
  update:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update EDINET annual baseline batch
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          EDINET_SCAN_DAYS: ${{ inputs.edinet_scan_days || '460' }}
          EDINET_BATCH_SIZE: ${{ inputs.edinet_batch_size || '50' }}
        run: |
          if [ -z "$EDINET_API_KEY" ]; then
            echo "EDINET_API_KEY is required." >&2
            exit 1
          else
            python scripts/update_edinet_financials_batched.py \
              --scan-days "$EDINET_SCAN_DAYS" \
              --max-documents "$EDINET_BATCH_SIZE"
          fi

      - name: Overlay strict TDnet full-year financials
        env:
          LOOKBACK_DAYS: ${{ inputs.lookback_days || '31' }}
        run: |
          python scripts/update_tdnet_financials_overlay_strict.py \
            --lookback-days "$LOOKBACK_DAYS"

      - name: Finalize annual dataset
        run: python scripts/finalize_annual_dataset.py

      - name: Validate financial dataset
        run: python scripts/validate_datasets.py --scope financial

      - name: Commit updated financial snapshot
        run: |
          git config user.name "kpi-scope-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data/financials.json public/data/update-status.json
          if git diff --cached --quiet; then
            echo "No financial snapshot changes."
          else
            git commit -m "Update annual financial snapshot batch"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
