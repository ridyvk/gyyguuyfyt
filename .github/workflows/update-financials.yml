name: Update annual financials

on:
  workflow_dispatch:
    inputs:
      edinet_scan_days:
        description: Days to scan EDINET filings
        required: false
        default: '460'
      edinet_batch_size:
        description: Maximum EDINET annual filings to process in one run
        required: false
        default: '350'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop source
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install --upgrade pandas xlrd

      - name: Update JPX company master
        run: python scripts/update_jpx_companies.py

      - name: Update annual financials
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          EDINET_SCAN_DAYS: ${{ inputs.edinet_scan_days || '460' }}
          EDINET_BATCH_SIZE: ${{ inputs.edinet_batch_size || '350' }}
        run: |
          if [ -z "$EDINET_API_KEY" ]; then
            echo "EDINET_API_KEY is required." >&2
            exit 1
          fi
          python scripts/update_edinet_financials_batched.py \
            --scan-days "$EDINET_SCAN_DAYS" \
            --max-documents "$EDINET_BATCH_SIZE"

      - name: Generate financial industry shards
        run: python scripts/split_financials.py

      - name: Validate financial datasets
        run: |
          python scripts/validate_datasets.py
          python scripts/audit_golden_companies.py --check

      - name: Commit updated financial data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: develop
          commit_message: "data: update annual financials"
          file_pattern: public/data/*.json public/data/financials/*.json
