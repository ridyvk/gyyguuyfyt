name: Patch low confidence scoring

on:
  push:
    branches:
      - codex/exclude-low-confidence-scoring
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/exclude-low-confidence-scoring
      - name: Patch live data scoring eligibility
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/lib/liveData.ts')
          text = path.read_text()
          needle = """const isUsableLiveMetric = (\n  key: KpiKey,\n  value: number,\n) => {\n  if (!Number.isFinite(value)) return false\n  if (\n    ['revenueGrowth', 'inventoryGrowth', 'receivablesGrowth'].includes(key) &&\n    value < -100\n  ) {\n    return false\n  }\n  if (key === 'debtRatio' && value < 0) return false\n  if (key === 'equityRatio' && (value < -100 || value > 100)) return false\n  return true\n}\n"""
          replacement = needle + """\nconst isScoreEligibleAssessment = (assessment: MetricConfidenceAssessment) =>\n  assessment.confidence === 'A' || assessment.confidence === 'B'\n"""
          if 'const isScoreEligibleAssessment' not in text:
              text = text.replace(needle, replacement)

          old = """  const available = new Set<KpiKey>(\n    kpiKeys.filter(\n      (key) => applicable.has(key) && recordMetrics[key] !== undefined,\n    ),\n  )\n  const metrics = Object.fromEntries(\n"""
          new = """  const metricAssessments = Object.fromEntries(\n    kpiKeys.map((key) => [key, assessMetricConfidence(key, recordMetrics[key], record)]),\n  ) as Record<KpiKey, MetricConfidenceAssessment>\n  const displayAvailable = new Set<KpiKey>(\n    kpiKeys.filter(\n      (key) => applicable.has(key) && recordMetrics[key] !== undefined,\n    ),\n  )\n  const scoringAvailable = new Set<KpiKey>(\n    kpiKeys.filter(\n      (key) =>\n        displayAvailable.has(key) &&\n        isScoreEligibleAssessment(metricAssessments[key]),\n    ),\n  )\n  const metrics = Object.fromEntries(\n"""
          text = text.replace(old, new)
          text = text.replace(
              """      const live = recordMetrics[key]\n      const assessment = assessMetricConfidence(key, live, record)\n""",
              """      const live = recordMetrics[key]\n      const assessment = metricAssessments[key]\n""",
          )
          text = text.replace(
              """    available,\n  )\n\n  return {\n""",
              """    scoringAvailable,\n  )\n\n  return {\n""",
              1,
          )
          text = text.replace('scores: calculateLiveScores(rawMetrics, available)', 'scores: calculateLiveScores(rawMetrics, scoringAvailable)')
          text = text.replace('strengths: buildStrengths(rawMetrics, available)', 'strengths: buildStrengths(rawMetrics, scoringAvailable)')
          text = text.replace(
              """      available,\n    ),\n    hasWarning: warnings.length > 0,\n""",
              """      scoringAvailable,\n    ),\n    hasWarning: warnings.length > 0,\n""",
          )
          text = text.replace('liveMetricCount: available.size', 'liveMetricCount: displayAvailable.size')
          path.write_text(text)
          PY
      - name: Add guard test
        run: |
          cat > tests/test_low_confidence_scoring_guard.py <<'PY'
          from pathlib import Path
          import unittest

          ROOT = Path(__file__).resolve().parents[1]
          LIVE_DATA = ROOT / 'src' / 'lib' / 'liveData.ts'

          class LowConfidenceScoringGuardTests(unittest.TestCase):
              def test_scoring_uses_confidence_filtered_available_set(self) -> None:
                  source = LIVE_DATA.read_text(encoding='utf-8')
                  self.assertIn("const isScoreEligibleAssessment", source)
                  self.assertIn("assessment.confidence === 'A' || assessment.confidence === 'B'", source)
                  self.assertIn("const scoringAvailable = new Set<KpiKey>", source)
                  self.assertIn("scores: calculateLiveScores(rawMetrics, scoringAvailable)", source)
                  self.assertIn("strengths: buildStrengths(rawMetrics, scoringAvailable)", source)
                  self.assertIn("buildAnalysisComment(\n      rawMetrics,\n      warnings,\n      previousOperatingMargin,\n      scoringAvailable", source)
                  self.assertIn("liveMetricCount: displayAvailable.size", source)

          if __name__ == '__main__':
              unittest.main()
          PY
      - name: Remove patch workflow
        run: rm .github/workflows/patch-low-confidence-scoring.yml
      - name: Commit patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/lib/liveData.ts tests/test_low_confidence_scoring_guard.py .github/workflows/patch-low-confidence-scoring.yml
          git commit -m "Exclude low-confidence KPI values from scoring" || exit 0
          git push origin codex/exclude-low-confidence-scoring
