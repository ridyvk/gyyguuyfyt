name: Build and deploy KPI Scope

# Manual deployment from the develop source branch.
# Data update workflows are separate:
# - Update annual financials
# - Update market prices
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Finalize and shard financial data
        run: |
          python scripts/finalize_annual_dataset.py
          python scripts/split_financials.py

      - name: Test and validate data pipelines
        run: |
          python -m unittest discover -s tests -p 'test_*.py'
          python scripts/validate_datasets.py --scope all
          python scripts/audit_golden_companies.py --check
          python scripts/audit_all_companies.py --check

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
