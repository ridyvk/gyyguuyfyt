name: Build and deploy KPI Scope

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.head_commit.message != 'Publish KPI Scope build'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Materialize application source
        if: hashFiles('.deploy-payload/part-*.txt') != ''
        shell: bash
        run: |
          cat .deploy-payload/part-*.txt | base64 --decode > kpi-scope-source.tar.xz
          tar -xJf kpi-scope-source.tar.xz
          cp -a kpi-scope/. .
          rm -rf kpi-scope kpi-scope-source.tar.xz .deploy-payload .site-payload
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Add KPI Scope application source"
            git push
          fi

      - name: Restore Vite entry
        run: cp app-index.html index.html

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Publish build to branch root
        shell: bash
        run: |
          rm -rf assets data icons
          cp -a dist/. .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- index.html assets data icons icon.svg manifest.webmanifest sw.js
          if ! git diff --cached --quiet; then
            git commit -m "Publish KPI Scope build"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
