name: Update market prices

on:
  workflow_dispatch:
    inputs:
      max_companies:
        description: Maximum companies to fetch quotes for
        required: false
        default: '4500'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop source
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: python -m pip install --upgrade pandas xlrd

      - name: Update JPX company master
        run: python scripts/update_jpx_companies.py

      - name: Update market prices
        env:
          MAX_COMPANIES: ${{ inputs.max_companies || '4500' }}
        run: |
          python scripts/update_market_prices.py \
            --max-companies "$MAX_COMPANIES" \
            --max-workers 8

      - name: Validate market dataset
        run: python scripts/validate_datasets.py

      - name: Commit updated market data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: develop
          commit_message: "data: update market prices"
          file_pattern: public/data/market.json public/data/update-status.json
