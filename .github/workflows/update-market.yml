name: Update market prices

on:
  workflow_run:
    workflows:
      - Update JPX company master
    types: [completed]
  push:
    branches: [main]
    paths:
      - .github/workflows/update-market.yml
      - scripts/data_quality.py
      - scripts/update_market_prices.py
      - scripts/validate_datasets.py
      - src/data/listedCompanies.json
  schedule:
    - cron: '45 7 * * 1-5'
    - cron: '45 9 * * 1-5'
  workflow_dispatch:
    inputs:
      max_companies:
        description: Maximum companies to fetch quotes for
        required: false
        default: '4500'

permissions:
  contents: write

concurrency:
  group: market-price-update
  cancel-in-progress: true

jobs:
  update-market:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update market snapshot
        env:
          MAX_COMPANIES: ${{ inputs.max_companies || '4500' }}
        run: |
          python scripts/update_market_prices.py \
            --max-companies "$MAX_COMPANIES" \
            --max-workers 8

      - name: Validate market dataset
        run: python scripts/validate_datasets.py --scope market

      - name: Commit updated market snapshot
        run: |
          git config user.name "kpi-scope-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data/market.json
          if git diff --cached --quiet; then
            echo "No market snapshot changes."
          else
            git commit -m "Update market price snapshot"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
