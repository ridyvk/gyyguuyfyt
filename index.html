<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f2f2f7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="KPI Scope" />
    <link rel="icon" type="image/png" href="./icon-192-photo1.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icon-180-photo1.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta
      name="description"
      content="日本の上場企業をKPIタイルで読み解く企業分析アプリ"
    />
    <title>KPI Scope</title>
    <script>
      ;(() => {
        const recoveryKey = 'kpi-scope-sw-module-recovery'
        const noServiceWorker = new URLSearchParams(window.location.search).has('no-sw')
        const clearCaches = () => {
          if (!('caches' in window)) return Promise.resolve()
          return caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
        }
        const unregisterWorkers = () => {
          if (!('serviceWorker' in navigator)) return Promise.resolve()
          return navigator.serviceWorker
            .getRegistrations()
            .then((registrations) => Promise.all(registrations.map((registration) => registration.unregister())))
        }
        const showFallback = () => {
          const root = document.getElementById('root')
          if (!root || root.childElementCount > 0) return
          root.innerHTML = `
            <main style="min-height:100vh;display:grid;place-items:center;padding:24px;background:#f6f7fb;color:#141414;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
              <section style="max-width:420px;border:1px solid #ddd;border-radius:12px;background:white;padding:24px;box-shadow:0 12px 28px rgba(0,0,0,.08)">
                <h1 style="margin:0 0 8px;font-size:20px">KPI Scopeを読み込めませんでした</h1>
                <p style="margin:0 0 16px;line-height:1.7;color:#555">古いキャッシュまたはService Workerを削除して再読み込みします。</p>
                <button id="kpi-recover" style="width:100%;border:0;border-radius:8px;background:#111;color:white;padding:12px;font-weight:700">キャッシュを削除して再読み込み</button>
              </section>
            </main>`
          document.getElementById('kpi-recover')?.addEventListener('click', () => recover(true))
        }
        const recover = (forceNoServiceWorker = false) => {
          if (sessionStorage.getItem(recoveryKey) === '1' && !forceNoServiceWorker) {
            showFallback()
            return
          }
          sessionStorage.setItem(recoveryKey, '1')
          Promise.all([unregisterWorkers(), clearCaches()]).finally(() => {
            const url = new URL(window.location.href)
            if (forceNoServiceWorker) url.searchParams.set('no-sw', '1')
            window.location.replace(url.toString())
          })
        }

        if (noServiceWorker) void Promise.all([unregisterWorkers(), clearCaches()])
        window.__KPI_SCOPE_RECOVER__ = recover

        window.addEventListener(
          'error',
          (event) => {
            const target = event.target
            if (target instanceof HTMLScriptElement && target.type === 'module') {
              recover(true)
              return
            }
            window.setTimeout(showFallback, 0)
          },
          true,
        )
        window.addEventListener('unhandledrejection', (event) => {
          const reason = String(event.reason?.message || event.reason || '')
          if (
            reason.includes('Failed to fetch dynamically imported module') ||
            reason.includes('Importing a module script failed') ||
            reason.includes('error loading dynamically imported module')
          ) {
            recover(true)
            return
          }
          window.setTimeout(showFallback, 0)
        })
        window.setTimeout(showFallback, 7000)
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
