<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f2f2f7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="KPI Scope" />
    <link rel="icon" type="image/png" href="./icon-192-photo1.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./icon-180-photo1.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta
      name="description"
      content="日本の上場企業をKPIタイルで読み解く企業分析アプリ"
    />
    <title>KPI Scope</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      ;(() => {
        const recoveryKey = 'kpi-scope-sw-module-recovery'
        const clearCaches = () => {
          if (!('caches' in window)) return Promise.resolve()
          return caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
        }
        const unregisterWorkers = () => {
          if (!('serviceWorker' in navigator)) return Promise.resolve()
          return navigator.serviceWorker
            .getRegistrations()
            .then((registrations) => Promise.all(registrations.map((registration) => registration.unregister())))
        }
        const recover = () => {
          if (sessionStorage.getItem(recoveryKey) === '1') return
          sessionStorage.setItem(recoveryKey, '1')
          Promise.all([unregisterWorkers(), clearCaches()]).finally(() => window.location.reload())
        }

        window.addEventListener(
          'error',
          (event) => {
            const target = event.target
            if (target instanceof HTMLScriptElement && target.type === 'module') recover()
          },
          true,
        )
        window.addEventListener('unhandledrejection', (event) => {
          const reason = String(event.reason?.message || event.reason || '')
          if (
            reason.includes('Failed to fetch dynamically imported module') ||
            reason.includes('Importing a module script failed')
          ) {
            recover()
          }
        })
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
