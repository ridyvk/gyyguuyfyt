<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="KPI Scope app icon">
  <defs>
    <radialGradient id="page" cx="42%" cy="30%" r="84%">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.64" stop-color="#f4f8ff"/>
      <stop offset="1" stop-color="#e8f2ff"/>
    </radialGradient>
    <radialGradient id="glass" cx="35%" cy="25%" r="78%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="0.38" stop-color="#f6fbff" stop-opacity="0.76"/>
      <stop offset="0.72" stop-color="#b7ddff" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#72b9ff" stop-opacity="0.30"/>
    </radialGradient>
    <radialGradient id="blueA" cx="40%" cy="38%" r="70%">
      <stop offset="0" stop-color="#0b7ee8" stop-opacity="0.90"/>
      <stop offset="0.55" stop-color="#4aa6ff" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rim" x1="160" y1="110" x2="720" y2="740" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="0.22" stop-color="#dff1ff" stop-opacity="0.88"/>
      <stop offset="0.52" stop-color="#2f84d8" stop-opacity="0.72"/>
      <stop offset="0.78" stop-color="#ffffff" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#89c9ff" stop-opacity="0.60"/>
    </linearGradient>
    <linearGradient id="handle" x1="610" y1="610" x2="930" y2="930" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.90"/>
      <stop offset="0.50" stop-color="#d9efff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#4da5ff" stop-opacity="0.28"/>
    </linearGradient>
    <clipPath id="lensClip">
      <circle cx="415" cy="390" r="292"/>
    </clipPath>
    <filter id="blurSoft" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="shadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#4a91d8" flood-opacity="0.16"/>
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-color="#1d1d1f" flood-opacity="0.08"/>
    </filter>
    <filter id="spark" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#page)"/>
  <circle cx="111" cy="-18" r="250" fill="none" stroke="#7cb7ed" stroke-width="5" opacity="0.26"/>
  <circle cx="1008" cy="12" r="180" fill="none" stroke="#7cb7ed" stroke-width="4" opacity="0.24"/>

  <g filter="url(#shadow)">
    <rect x="594" y="604" width="356" height="124" rx="62" fill="url(#handle)" stroke="#eaf6ff" stroke-width="12" opacity="0.86" transform="rotate(45 594 604)"/>
    <rect x="631" y="638" width="260" height="44" rx="22" fill="#ffffff" opacity="0.42" transform="rotate(45 631 638)"/>

    <circle cx="415" cy="390" r="312" fill="#ffffff" opacity="0.62"/>
    <circle cx="415" cy="390" r="292" fill="url(#glass)" opacity="0.86"/>

    <g clip-path="url(#lensClip)">
      <rect x="110" y="86" width="610" height="610" fill="#f8fcff" opacity="0.18"/>
      <path d="M166 420 C234 320 316 346 372 270 C430 190 552 196 622 300 C526 278 489 352 438 410 C364 494 270 502 166 420Z" fill="url(#blueA)" opacity="0.88" filter="url(#blurSoft)"/>
      <path d="M190 553 C298 498 370 606 475 538 C553 488 592 424 675 455 C614 570 514 646 380 651 C292 655 227 616 190 553Z" fill="#1789f2" opacity="0.58" filter="url(#blurSoft)"/>
      <path d="M257 257 C343 205 420 257 482 209 C548 158 626 201 657 277 C580 250 526 293 470 342 C382 418 290 358 226 407 C218 346 222 286 257 257Z" fill="#ffffff" opacity="0.70" filter="url(#blurSoft)"/>
      <path d="M302 650 C366 570 455 578 520 505 C575 444 637 453 690 512 C618 593 565 678 435 712 C372 727 325 703 302 650Z" fill="#ffffff" opacity="0.68" filter="url(#blurSoft)"/>
      <path d="M175 520 C266 563 336 527 386 468 C430 416 480 384 552 406" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round" opacity="0.42" filter="url(#blurSoft)"/>
      <path d="M314 236 C393 321 504 276 608 330" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" opacity="0.35" filter="url(#blurSoft)"/>
      <path d="M250 452 C333 397 395 474 474 425 C541 384 573 331 641 367" fill="none" stroke="#0f7dde" stroke-width="16" stroke-linecap="round" opacity="0.44" filter="url(#blurSoft)"/>
      <g filter="url(#spark)" fill="#ffffff" opacity="0.72">
        <circle cx="330" cy="365" r="4"/><circle cx="402" cy="425" r="3"/><circle cx="469" cy="350" r="3.5"/><circle cx="515" cy="493" r="5"/><circle cx="272" cy="525" r="3"/><circle cx="574" cy="292" r="3"/><circle cx="360" cy="604" r="4"/>
      </g>
    </g>

    <circle cx="415" cy="390" r="310" fill="none" stroke="#ffffff" stroke-width="18" opacity="0.72"/>
    <circle cx="415" cy="390" r="292" fill="none" stroke="url(#rim)" stroke-width="14" opacity="0.92"/>
    <circle cx="415" cy="390" r="265" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.44"/>
    <path d="M206 222 C289 134 432 99 557 162" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" opacity="0.56" filter="url(#spark)"/>
    <path d="M187 319 C228 208 337 151 472 148" fill="none" stroke="#1a79c9" stroke-width="10" stroke-linecap="round" opacity="0.30"/>
  </g>
</svg>
